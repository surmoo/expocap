<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<title>ExpoCapture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0a0a; --surface: #141414; --border: #222;
    --accent: #e8ff00; --accent2: #ff4d00; --text: #f0f0f0;
    --muted: #555; --danger: #ff3333; --record: #ff2244; --sign: #ff9500;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; min-height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  .header { padding: 14px 20px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px; color: var(--accent); }
  .header-sub { font-size: 9px; color: var(--muted); text-align: right; line-height: 1.6; }

  .stats-bar { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .stat { flex: 1; padding: 8px 0; text-align: center; border-right: 1px solid var(--border); font-size: 9px; color: var(--muted); letter-spacing: 0.5px; }
  .stat:last-child { border-right: none; }
  .stat-val { display: block; font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .stat-val.accent { color: var(--accent); }
  .stat-val.orange { color: var(--accent2); }
  .stat-val.blue { color: #4d9fff; font-size: 14px; }

  .breadcrumb { padding: 8px 20px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; }

  .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; animation: slideIn 0.15s ease; }
  @keyframes slideIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .item-icon { font-size: 18px; flex-shrink: 0; width: 28px; text-align: center; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { font-size: 9px; color: var(--muted); margin-top: 2px; }
  .item-tag { font-size: 8px; padding: 2px 6px; border-radius: 2px; font-weight: 700; letter-spacing: 1px; flex-shrink: 0; }
  .tag-booth { background: var(--accent); color: #000; }
  .tag-item  { background: var(--accent2); color: #fff; }
  .tag-photo { background: #1a3a1a; color: #4dff4d; border: 1px solid #2a5a2a; }
  .tag-audio { background: #1a1a3a; color: #4d4dff; border: 1px solid #2a2a5a; }
  .tag-sign  { background: #2a1a00; color: var(--sign); border: 1px solid #4a2a00; }

  .actions { padding: 12px 20px 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
  .btn-row { display: flex; gap: 8px; }

  .btn { flex: 1; height: 52px; border: none; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 10px; letter-spacing: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: transform 0.08s, opacity 0.08s; position: relative; overflow: hidden; text-transform: uppercase; }
  .btn:active { transform: scale(0.96); opacity: 0.85; }
  .btn:disabled { cursor: default; }

  .btn-booth   { background: var(--accent); color: #000; font-size: 11px; }
  .btn-product { background: var(--accent2); color: #fff; }
  .btn-sign    { background: #2a1a00; color: var(--sign); border: 1px solid #4a2a00; }
  .btn-photo   { background: #1e3a1e; color: #6dff6d; border: 1px solid #2a5a2a; }
  .btn-audio   { background: #1e1e3a; color: #6d6dff; border: 1px solid #2a2a5a; }
  .btn-audio.recording { background: #3a0010; color: var(--record); border-color: var(--record); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,34,68,.3);}50%{box-shadow:0 0 0 8px rgba(255,34,68,0);} }

  .btn-log  { background: transparent; color: var(--muted); border: 1px solid var(--border); height: 40px; font-size: 10px; }
  .btn-clear{ background: transparent; color: #333; border: 1px solid #1a1a1a; height: 40px; font-size: 9px; flex: 0 0 auto; width: 80px; }

  .rec-timer { position: absolute; right: 10px; font-size: 9px; color: var(--record); font-weight: 700; }

  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--muted); font-size: 11px; padding: 40px; text-align: center; }
  .empty-icon { font-size: 36px; opacity: 0.3; }

  /* PREVIEW */
  .preview-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.94); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; gap: 16px; }
  .preview-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .preview-overlay img { max-width: 100%; max-height: 58dvh; border-radius: 4px; border: 1px solid var(--border); object-fit: contain; }
  .preview-actions { display: flex; gap: 12px; width: 100%; max-width: 400px; }
  .btn-keep    { flex:1; height:50px; background:var(--accent); color:#000; border:none; border-radius:4px; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; cursor:pointer; }
  .btn-discard { flex:1; height:50px; background:transparent; color:var(--danger); border:1px solid var(--danger); border-radius:4px; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; cursor:pointer; }

  /* TOAST */
  .toast { position:fixed; bottom:110px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface); border:1px solid var(--border); color:var(--text); padding:9px 18px; border-radius:4px; font-size:11px; opacity:0; transition:all 0.2s; pointer-events:none; white-space:nowrap; z-index:200; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .status-bar { padding:5px 20px; font-size:9px; color:var(--muted); border-top:1px solid var(--border); letter-spacing:0.5px; flex-shrink:0; }
  .status-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--accent); margin-right:6px; vertical-align:middle; }
  .status-dot.red { background:var(--record); animation:pulse 1s infinite; }

  #fileInput, #signInput { display: none; }

  /* CONFIRM */
  .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:300; padding:30px; }
  .confirm-box { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:24px; max-width:320px; width:100%; text-align:center; }
  .confirm-title { font-size:13px; font-weight:700; margin-bottom:8px; color:var(--danger); }
  .confirm-text  { font-size:10px; color:var(--muted); margin-bottom:20px; line-height:1.6; }
  .confirm-btns  { display:flex; gap:10px; }
  .btn-confirm-yes { flex:1; height:44px; background:var(--danger); color:#fff; border:none; border-radius:4px; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:12px; cursor:pointer; }
  .btn-confirm-no  { flex:1; height:44px; background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:4px; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:12px; cursor:pointer; }

  /* LOG OVERLAY */
  .log-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.94); display:flex; flex-direction:column; z-index:100; padding:20px; gap:12px; }
  .log-header { display:flex; align-items:center; justify-content:space-between; }
  .log-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--accent); }
  .log-close { background:transparent; border:1px solid var(--border); color:var(--muted); padding:6px 14px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:11px; cursor:pointer; }
  .log-body { flex:1; overflow-y:auto; font-size:10px; color:var(--muted); line-height:2; }
  .log-body b { color:var(--text); }
  .log-body .log-sign { color:var(--sign); }
  .log-body .log-photo { color:#4dff4d; }
  .log-body .log-audio { color:#4d4dff; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">EXPOCAP</div>
  <div class="header-sub">файлы → Downloads<br>работает офлайн</div>
</div>

<div class="stats-bar">
  <div class="stat"><span class="stat-val accent" id="statBooths">0</span>стендов</div>
  <div class="stat"><span class="stat-val orange" id="statProducts">0</span>товаров</div>
  <div class="stat"><span class="stat-val" id="statPhotos">0</span>фото</div>
  <div class="stat"><span class="stat-val" id="statAudios">0</span>аудио</div>
  <div class="stat"><span class="stat-val blue" id="statTimer">—</span>стенд</div>
</div>

<div class="breadcrumb" id="breadcrumb">/ нет активного стенда</div>

<div class="scroll-area" id="scrollArea">
  <div class="empty" id="emptyState">
    <div class="empty-icon">📦</div>
    <div>Нажми СТЕНД чтобы начать</div>
  </div>
</div>

<div class="actions">
  <div class="btn-row">
    <button class="btn btn-booth"   onclick="newBooth()">＋ СТЕНД</button>
    <button class="btn btn-product" onclick="newProduct()" id="btnProduct" disabled style="opacity:.35">＋ ТОВАР</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-sign" onclick="takeSign()" id="btnSign" disabled style="opacity:.35">🪧 ТАБЛИЧКА СТЕНДА</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-photo" onclick="takePhoto()" id="btnPhoto" disabled style="opacity:.35">📷 ФОТО ТОВАРА</button>
    <button class="btn btn-audio" onclick="toggleAudio()" id="btnAudio" disabled style="opacity:.35">🎙 АУДИО</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-log" onclick="showLog()" style="flex:1">📋 ЛОГ СЕССИИ</button>
    <button class="btn btn-clear" onclick="confirmClear()">🗑 СБРОС</button>
  </div>
</div>

<div class="status-bar">
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">готов к работе</span>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="image/*" capture="environment">
<input type="file" id="signInput" accept="image/*" capture="environment">

<!-- PREVIEW -->
<div class="preview-overlay" id="previewOverlay" style="display:none">
  <div class="preview-label" id="previewLabel">ФОТО</div>
  <img id="previewImg" src="" alt="">
  <div class="preview-actions">
    <button class="btn-keep"    onclick="keepPhoto()">✓ СОХРАНИТЬ</button>
    <button class="btn-discard" onclick="discardPhoto()">✕ УДАЛИТЬ</button>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay" style="display:none">
  <div class="confirm-box">
    <div class="confirm-title">⚠ СБРОСИТЬ СЕССИЮ?</div>
    <div class="confirm-text">Лог сессии будет очищен.<br>Файлы в Downloads останутся.</div>
    <div class="confirm-btns">
      <button class="btn-confirm-yes" onclick="clearAll()">СБРОСИТЬ</button>
      <button class="btn-confirm-no"  onclick="document.getElementById('confirmOverlay').style.display='none'">ОТМЕНА</button>
    </div>
  </div>
</div>

<!-- LOG -->
<div class="log-overlay" id="logOverlay" style="display:none">
  <div class="log-header">
    <div class="log-title">ЛОГ СЕССИИ</div>
    <button class="log-close" onclick="document.getElementById('logOverlay').style.display='none'">ЗАКРЫТЬ</button>
  </div>
  <div class="log-body" id="logBody"></div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────
// Хранится в localStorage — восстанавливается после закрытия
// Файлы скачиваются сразу в Downloads — не теряются никогда
let state = {
  booths: [], currentBoothIdx: -1, currentProductIdx: -1,
  log: [],   // [{ts, type, boothName, productName, fname}]
  boothCounter: 0, productCounter: 0, fileCounter: 0,
  boothStartTime: null,
};

let mediaRecorder = null, audioChunks = [], recTimerInterval = null;
let boothTimerInterval = null, pendingPhoto = null;

// ── PERSISTENCE ────────────────────────────────────────
function save() {
  try { localStorage.setItem('expocap_v3', JSON.stringify(state)); } catch(e) {}
}
function load() {
  try {
    const r = localStorage.getItem('expocap_v3');
    if (r) { state = { ...state, ...JSON.parse(r) }; return true; }
  } catch(e) {}
  return false;
}

// ── HELPERS ────────────────────────────────────────────
function tsISO() { return new Date().toISOString(); }
function tsFile() { return new Date().toISOString().replace(/[:.]/g,'-').slice(0,19); }
function pad(n)   { return String(n).padStart(3,'0'); }

function showToast(msg, dur=1800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function setStatus(msg, rec=false) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusDot').className = 'status-dot' + (rec?' red':'');
}
function currentBooth()   { return state.booths[state.currentBoothIdx] || null; }
function currentProduct() { const b=currentBooth(); return b?(b.products[state.currentProductIdx]||null):null; }

function updateUI() {
  const b = currentBooth(), p = currentProduct();
  // stats
  document.getElementById('statBooths').textContent  = state.booths.length;
  document.getElementById('statProducts').textContent = state.booths.reduce((a,x)=>a+x.products.length,0);
  document.getElementById('statPhotos').textContent   = state.log.filter(x=>x.type==='photo'||x.type==='sign').length;
  document.getElementById('statAudios').textContent   = state.log.filter(x=>x.type==='audio').length;
  // breadcrumb
  document.getElementById('breadcrumb').innerHTML = b
    ? `/ <b>${b.name}</b>${p?' / <b>'+p.name+'</b>':' / нет товара'}`
    : '/ нет активного стенда';
  // buttons
  const set=(id,on)=>{ const el=document.getElementById(id); el.disabled=!on; el.style.opacity=on?'1':'0.35'; };
  set('btnProduct', !!b); set('btnSign', !!b);
  set('btnPhoto', !!p);   set('btnAudio', !!p);
}

function startBoothTimer() {
  clearInterval(boothTimerInterval);
  boothTimerInterval = setInterval(() => {
    if (!state.boothStartTime) return;
    const s = Math.floor((Date.now() - new Date(state.boothStartTime).getTime()) / 1000);
    document.getElementById('statTimer').textContent =
      `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  }, 1000);
}

function addCard(icon, name, meta, tag, cls) {
  document.getElementById('emptyState')?.remove();
  const area = document.getElementById('scrollArea');
  const el = document.createElement('div');
  el.className = 'item-card';
  el.innerHTML = `<div class="item-icon">${icon}</div><div class="item-info"><div class="item-name">${name}</div><div class="item-meta">${meta}</div></div><div class="item-tag ${cls}">${tag}</div>`;
  area.appendChild(el);
  el.scrollIntoView({behavior:'smooth', block:'end'});
}

function rebuildFeed() {
  const area = document.getElementById('scrollArea');
  area.innerHTML = '';
  if (!state.booths.length) {
    area.innerHTML = '<div class="empty" id="emptyState"><div class="empty-icon">📦</div><div>Нажми СТЕНД чтобы начать</div></div>';
    return;
  }
  for (const b of state.booths) {
    addCard('🏢', b.name, b.ts.slice(0,10), 'СТЕНД', 'tag-booth');
    for (const p of b.products)
      addCard('📦', p.name, `в ${b.name}`, 'ТОВАР', 'tag-item');
  }
  for (const entry of state.log) {
    if (entry.type==='sign')  addCard('🪧', entry.fname, entry.boothName, 'ТАБЛИЧКА', 'tag-sign');
    if (entry.type==='photo') addCard('📷', entry.fname, `${entry.boothName}/${entry.productName}`, 'ФОТО', 'tag-photo');
    if (entry.type==='audio') addCard('🎙', entry.fname, `${entry.boothName}/${entry.productName}`, 'АУДИО', 'tag-audio');
  }
}

// ── DOWNLOAD IMMEDIATELY ───────────────────────────────
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

// ── BOOTH ──────────────────────────────────────────────
function newBooth() {
  state.boothCounter++;
  const id=`booth_${pad(state.boothCounter)}`, name=`Стенд_${pad(state.boothCounter)}`;
  state.booths.push({id, name, ts:tsISO(), products:[]});
  state.currentBoothIdx = state.booths.length - 1;
  state.currentProductIdx = -1;
  state.boothStartTime = tsISO();
  startBoothTimer();
  addCard('🏢', name, new Date().toLocaleTimeString(), 'СТЕНД', 'tag-booth');
  updateUI(); save();
  showToast(`${name} активен`);
  setStatus(`стенд: ${name}`);
}

// ── PRODUCT ────────────────────────────────────────────
function newProduct() {
  if (!currentBooth()) return;
  state.productCounter++;
  const id=`product_${pad(state.productCounter)}`, name=`Товар_${pad(state.productCounter)}`;
  currentBooth().products.push({id, name, ts:tsISO()});
  state.currentProductIdx = currentBooth().products.length - 1;
  addCard('📦', name, `в ${currentBooth().name}`, 'ТОВАР', 'tag-item');
  updateUI(); save();
  showToast(`${name} активен`);
  setStatus(`товар: ${name}`);
}

// ── SIGN PHOTO ─────────────────────────────────────────
function takeSign() {
  if (!currentBooth()) return;
  document.getElementById('signInput').click();
}
document.getElementById('signInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  state.fileCounter++;
  const fname = `${currentBooth().id}__sign__${pad(state.fileCounter)}__${tsFile()}.jpg`;
  pendingPhoto = {blob:file, fname, type:'sign'};
  document.getElementById('previewLabel').textContent = '🪧 ТАБЛИЧКА СТЕНДА';
  document.getElementById('previewImg').src = URL.createObjectURL(file);
  document.getElementById('previewOverlay').style.display = 'flex';
  e.target.value = '';
});

// ── PHOTO ──────────────────────────────────────────────
function takePhoto() {
  if (!currentProduct()) return;
  document.getElementById('fileInput').click();
}
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const b=currentBooth(), p=currentProduct();
  state.fileCounter++;
  const fname = `${b.id}__${p.id}__photo_${pad(state.fileCounter)}__${tsFile()}.jpg`;
  pendingPhoto = {blob:file, fname, type:'photo'};
  document.getElementById('previewLabel').textContent = '📷 ФОТО ТОВАРА';
  document.getElementById('previewImg').src = URL.createObjectURL(file);
  document.getElementById('previewOverlay').style.display = 'flex';
  e.target.value = '';
});

function keepPhoto() {
  if (!pendingPhoto) return;
  const {blob, fname, type} = pendingPhoto;
  const b = currentBooth(), p = currentProduct();

  // Скачиваем СРАЗУ в Downloads
  downloadBlob(blob, fname);

  // Логируем
  state.log.push({
    ts: tsISO(), type, fname,
    boothName: b.name,
    productName: p?.name || null,
  });

  const ctx = type==='sign' ? b.name : `${b.name}/${p.name}`;
  if (type==='sign') addCard('🪧', fname, ctx, 'ТАБЛИЧКА', 'tag-sign');
  else               addCard('📷', fname, ctx, 'ФОТО',     'tag-photo');

  URL.revokeObjectURL(document.getElementById('previewImg').src);
  document.getElementById('previewOverlay').style.display = 'none';
  pendingPhoto = null;
  updateUI(); save();
  showToast('сохранено в Downloads ↓');
}

function discardPhoto() {
  URL.revokeObjectURL(document.getElementById('previewImg').src);
  document.getElementById('previewOverlay').style.display = 'none';
  pendingPhoto = null;
  state.fileCounter = Math.max(0, state.fileCounter - 1);
  showToast('удалено');
}

// ── AUDIO ──────────────────────────────────────────────
async function toggleAudio() {
  if (mediaRecorder && mediaRecorder.state==='recording') stopAudio();
  else startAudio();
}
async function startAudio() {
  if (!currentProduct()) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = saveAudio;
    mediaRecorder.start();
    const t0 = Date.now();
    const btn = document.getElementById('btnAudio');
    btn.classList.add('recording');
    btn.innerHTML = '⏹ СТОП <span class="rec-timer" id="recTimer">0:00</span>';
    recTimerInterval = setInterval(() => {
      const s = Math.floor((Date.now()-t0)/1000);
      const el = document.getElementById('recTimer');
      if (el) el.textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
    }, 500);
    setStatus('● запись...', true);
  } catch(e) {
    showToast('нет доступа к микрофону');
    setStatus('ошибка микрофона');
  }
}
function stopAudio() {
  if (mediaRecorder) { mediaRecorder.stop(); mediaRecorder.stream.getTracks().forEach(t=>t.stop()); mediaRecorder=null; }
  clearInterval(recTimerInterval);
  const btn = document.getElementById('btnAudio');
  btn.classList.remove('recording');
  btn.innerHTML = '🎙 АУДИО';
}
function saveAudio() {
  const b=currentBooth(), p=currentProduct(); if (!b||!p) return;
  state.fileCounter++;
  const blob = new Blob(audioChunks, {type:'audio/webm'});
  const fname = `${b.id}__${p.id}__audio_${pad(state.fileCounter)}__${tsFile()}.webm`;

  // Скачиваем СРАЗУ в Downloads
  downloadBlob(blob, fname);

  state.log.push({ts:tsISO(), type:'audio', fname, boothName:b.name, productName:p.name});
  addCard('🎙', fname, `${b.name}/${p.name}`, 'АУДИО', 'tag-audio');
  updateUI(); save();
  showToast('аудио сохранено в Downloads ↓');
  setStatus('аудио сохранено');
}

// ── LOG ────────────────────────────────────────────────
function showLog() {
  const body = document.getElementById('logBody');
  if (!state.log.length && !state.booths.length) {
    body.innerHTML = '<span style="color:var(--muted)">пусто</span>';
  } else {
    let html = '';
    for (const b of state.booths) {
      html += `<b>🏢 ${b.name}</b> — ${b.ts.slice(0,16).replace('T',' ')}<br>`;
      for (const p of b.products) {
        html += `&nbsp;&nbsp;<b>📦 ${p.name}</b><br>`;
        for (const e of state.log.filter(x=>x.productName===p.name&&x.boothName===b.name)) {
          const icon = e.type==='audio'?'🎙':'📷';
          const cls  = e.type==='audio'?'log-audio':e.type==='sign'?'log-sign':'log-photo';
          html += `&nbsp;&nbsp;&nbsp;&nbsp;<span class="${cls}">${icon} ${e.fname}</span><br>`;
        }
      }
      for (const e of state.log.filter(x=>x.type==='sign'&&x.boothName===b.name)) {
        html += `&nbsp;&nbsp;<span class="log-sign">🪧 ${e.fname}</span><br>`;
      }
    }
    body.innerHTML = html || '<span style="color:var(--muted)">пусто</span>';
  }
  document.getElementById('logOverlay').style.display = 'flex';
}

// ── CLEAR ──────────────────────────────────────────────
function confirmClear() { document.getElementById('confirmOverlay').style.display='flex'; }
function clearAll() {
  state = {booths:[],currentBoothIdx:-1,currentProductIdx:-1,log:[],boothCounter:0,productCounter:0,fileCounter:0,boothStartTime:null};
  localStorage.removeItem('expocap_v3');
  clearInterval(boothTimerInterval);
  document.getElementById('statTimer').textContent = '—';
  document.getElementById('confirmOverlay').style.display = 'none';
  rebuildFeed(); updateUI();
  showToast('сессия сброшена'); setStatus('готов к работе');
}

// ── SERVICE WORKER ────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── INIT ──────────────────────────────────────────────
load();
rebuildFeed();
if (state.boothStartTime) startBoothTimer();
updateUI();
setStatus('готов к работе');
</script>
</body>
</html>
